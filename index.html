<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Royal River Telegram Poker Kulubu</title>
  <meta name="description" content="Royal River poker kulubune Telegram uzerinden katil.">
  <meta name="theme-color" content="#0b0c0f">
  <meta property="og:title" content="Royal River Poker Kulubu">
  <meta property="og:description" content="Royal River poker kulubune Telegram uzerinden katil.">
  <meta property="og:image" content="assets/hero.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #08090c;
      --panel: rgba(24, 24, 23, .76);
      --panel-strong: rgba(13, 14, 18, .84);
      --line: rgba(255, 255, 255, .15);
      --line-gold: rgba(222, 181, 76, .45);
      --text: #f6f4ee;
      --muted: rgba(246, 244, 238, .72);
      --soft: rgba(246, 244, 238, .12);
      --gold: #d8ad3f;
      --gold-light: #ffe786;
      --shadow: rgba(0, 0, 0, .58);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    body {
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      background:
        linear-gradient(180deg, rgba(8, 9, 12, .54), rgba(8, 9, 12, .92)),
        url("assets/hero.webp") center / cover fixed,
        var(--bg);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, .7), transparent 24%, transparent 76%, rgba(0, 0, 0, .7)),
        radial-gradient(circle at 52% 34%, rgba(222, 181, 76, .18), transparent 34%),
        radial-gradient(circle at 50% 100%, rgba(39, 46, 57, .65), transparent 42%);
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 42px 18px;
    }

    .shell {
      width: min(675px, 100%);
      min-height: min(760px, calc(100vh - 84px));
      display: grid;
      align-content: center;
      gap: 26px;
      padding: clamp(32px, 6vw, 58px);
      border: 1px solid var(--line-gold);
      border-radius: 30px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, .07), transparent 34%),
        linear-gradient(180deg, rgba(40, 40, 37, .78), rgba(12, 13, 17, .84)),
        var(--panel);
      box-shadow: 0 28px 90px var(--shadow), inset 0 1px 0 rgba(255, 255, 255, .12);
      backdrop-filter: blur(18px);
      text-align: center;
    }

    .badge {
      width: fit-content;
      max-width: 100%;
      margin: 0 auto;
      padding: 13px 22px;
      border: 1px solid var(--line-gold);
      border-radius: 999px;
      color: var(--gold-light);
      font-size: clamp(11px, 2.8vw, 15px);
      font-weight: 700;
      letter-spacing: .28em;
      text-transform: uppercase;
      background: rgba(13, 14, 18, .32);
      overflow-wrap: anywhere;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .brand img {
      width: 54px;
      height: 54px;
      object-fit: contain;
      filter: drop-shadow(0 10px 25px rgba(216, 173, 63, .26));
    }

    .brand span {
      color: rgba(246, 244, 238, .86);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .22em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 570px;
      margin: 0 auto;
      font-size: clamp(45px, 11vw, 76px);
      line-height: .96;
      font-weight: 900;
      text-wrap: balance;
    }

    h1 span {
      display: block;
      color: var(--gold);
      text-shadow: 0 0 35px rgba(216, 173, 63, .22);
    }

    .lead {
      max-width: 570px;
      margin: 0 auto;
      color: var(--muted);
      font-size: clamp(21px, 4.4vw, 30px);
      line-height: 1.5;
      font-weight: 600;
      text-wrap: balance;
    }

    .cta {
      width: fit-content;
      max-width: 100%;
      margin: 8px auto 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 68px;
      padding: 0 38px;
      border-radius: 999px;
      color: #090806;
      background: linear-gradient(135deg, #d7a23a, #fff08c 54%, #d0a044);
      box-shadow: 0 18px 48px rgba(216, 173, 63, .34);
      text-decoration: none;
      font-size: clamp(19px, 4vw, 26px);
      font-weight: 900;
      transition: transform .2s ease, box-shadow .2s ease, filter .2s ease;
    }

    .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 24px 58px rgba(216, 173, 63, .44);
      filter: saturate(1.08);
    }

    .cta:focus-visible,
    .pill:focus-visible {
      outline: 3px solid rgba(255, 231, 134, .62);
      outline-offset: 4px;
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      margin-top: 4px;
    }

    .pill {
      min-height: 58px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0 23px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, .07);
      color: rgba(246, 244, 238, .82);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .06);
      font-size: clamp(15px, 3.4vw, 20px);
      font-weight: 800;
      letter-spacing: .07em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .pill b {
      color: var(--gold-light);
      font-size: .95em;
    }

    .age {
      margin: 0;
      color: rgba(246, 244, 238, .5);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    @media (max-width: 560px) {
      body {
        background-attachment: scroll;
      }

      .page {
        align-items: start;
        padding: 26px 14px;
      }

      .shell {
        min-height: calc(100vh - 52px);
        padding: 30px 22px;
        gap: 24px;
        border-radius: 28px;
      }

      .brand img {
        width: 44px;
        height: 44px;
      }

      .cta {
        width: 100%;
        min-height: 64px;
        padding-inline: 20px;
      }

      .pills {
        gap: 12px;
      }

      .pill {
        min-width: min(235px, 100%);
      }
    }

    @media (min-width: 720px) {
      .shell {
        gap: 20px;
        padding: 42px 50px;
      }

      h1 {
        font-size: clamp(52px, 6vw, 64px);
      }

      .lead {
        font-size: 22px;
      }

      .cta {
        min-height: 62px;
        font-size: 22px;
      }

      .pill {
        min-height: 50px;
        font-size: 15px;
      }

    }
  </style>
</head>
<body>
  <main class="page">
    <section class="shell" aria-labelledby="site-title">
      <div class="brand" aria-label="Royal River">
        <img src="assets/logo.webp" alt="Royal River logo">
        <span>Royal River</span>
      </div>

      <div class="badge">Ozel Turkiye Poker Kulubu</div>

      <h1 id="site-title">Royal River <span>Online Poker Kulubu</span></h1>

      <p class="lead">Ozel masalar, VIP topluluk ve 7/24 aktif poker deneyimi icin Telegram kanalina katil.</p>

      <a class="cta" href="https://t.me/RoyalRiver_Club" target="_blank" rel="noreferrer">Join Telegram <span aria-hidden="true">&rarr;</span></a>

      <div class="pills" aria-label="Kulup ozellikleri">
        <span class="pill"><b>&spades;</b> Ozel Masalar</span>
        <span class="pill"><b>&clubs;</b> VIP Topluluk</span>
        <span class="pill"><b>&diams;</b> Premium Deneyim</span>
        <span class="pill"><b>&hearts;</b> 7/24 Online</span>
      </div>

      <p class="age">18+ | Sorumlu oyun</p>
    </section>
  </main>
</body>
</html>
